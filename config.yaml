# LLM Configuration - Choose your AI model provider
llm:
  # Provider: 'claude', 'deepseek', 'gemini', 'grok', 'openai'
  # Claude (Anthropic): Excellent quality, higher cost
  # DeepSeek: Good quality, much lower cost, better Chinese support
  # Gemini: Fast, multimodal, free tier available
  # Grok: Advanced reasoning, real-time data
  # OpenAI: Industry standard, latest models
  provider: deepseek

  # Optional: Specify a model (if not set, uses provider's default)
  # Claude models: claude-sonnet-4-5-20250929, claude-3-5-sonnet-20241022
  # DeepSeek models: deepseek-chat, deepseek-reasoner
  # model: deepseek-chat

news:
  # Enable web search tool (uses DuckDuckGo API via LLM tool calling)
  # Note: DuckDuckGo API often returns limited results. RSS feeds are more reliable.
  # Default: false (recommended to keep disabled)
  enable_web_search: false

  # Maximum news items to fetch per source (fetch more for AI to select from)
  max_items_per_source: 50

  # Stage 1: Selection prompt template
  stage1_prompt_template: |
      {formatted_news}

      ## 任务 - 第一阶段：新闻筛选

      你是一位资深财经分析师。分析上述新闻，筛选出15-20条最具价值的新闻。

      ### 筛选标准：
      - ✅ 影响市场走势的重大事件
      - ✅ 宏观经济数据发布（CPI、PPI、GDP、就业等）
      - ✅ 各国央行政策动态（美联储、央行利率决议）
      - ✅ 地缘政治重大事件（战争、制裁、谈判）
      - ✅ 重要政策变化和会议
      - ✅ 加密货币市场重大动态
      - ✅ 平衡各分类的覆盖

      ### 输出格式：
      仅返回JSON数组形式的新闻ID，无需解释。

      示例格式：
      ["china_stock-1", "us_stock-3", "crypto-2", ...]

      注意：必须筛选出15-20条新闻。

  # Stage 2: Summarization prompt template
  stage2_prompt_template: |
      你是一位资深财经分析师。为以下预选的新闻创建一份全面的每日财经简报。

      {selected_news}

      ## 输出结构：

      按以下分类组织新闻（只使用有新闻的分类）：
      1. **一周重要经济日历** - 未来一周的重大经济事件（央行利率决议、CPI、GDP等）
      2. **中国股市** - A股、科创板、北交所、重大政策
      3. **美国股市** - 美股大盘、巨头财报、重要经济数据
      4. **虚拟货币** - 比特币、以太坊、山寨币、交易所动态
      5. **宏观经济** - GDP、CPI、美联储、央行政策
      6. **中国政治** - 重要政策、会议、重大事件
      7. **国际政治** - 地缘政治、重大国际事件

      ## 重要提醒：
      - **经济日历必须放在最前面**，因为这是对未来一周最重要的参考信息
      - 每条经济日历事件要标注：时间、重要性（极高/高/中）、预期影响

      ## 内容要求：

      每条新闻需包含：
      1. **清晰标题**：简明扼要
      2. **分析性摘要（4-6句）**：
         - 发生了什么（核心新闻和背景）
         - 关键数据、指标
         - 对市场的影响（如果有）
         - 未来可能的发展
      3. **来源**：始终包含可点击链接

      ## 写作风格：
      - 专业分析语气
      - 包含具体数据
      - 客观准确，避免猜测

      ## 格式示例：

      ## 一周重要经济日历

      | 日期 | 时间 | 事件 | 重要性 |
      |------|------|------|--------|
      | 周三 | 02:00 | 美联储利率决议 | 极高 |
      | 周三 | 20:30 美国 | 美国CPI月率 | 极高 |
      | 周四 | 02:30 | 鲍威尔讲话 | 极高 |
      | 周五 | 20:30 | 美国零售销售月率 | 高 |

      ---

      ## 中国股市

      ### A股三大指数今日集体上涨

      今日A股市场震荡上扬，沪指涨0.85%，深成指涨1.12%，创业板指涨1.23%。成交量较前一交易日放大15%。券商板块整体走强，龙头股涨停。分析师认为，此轮上涨主要受政策利好和经济数据企稳提振。

      来源: [新浪财经](https://finance.sina.com.cn)

      ---

      ## 质量要求：
      - ✅ 经济日历必须放在最前面
      - ✅ 总结所有 {count} 条新闻
      - ✅ 每条摘要4-6句
      - ✅ 包含具体数据和指标
      - ✅ 平衡各分类覆盖
      - ✅ 所有来源必须有可点击链接

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
