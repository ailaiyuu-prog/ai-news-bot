name: 每日财经新闻

on:
  # 每天 0:00 UTC 运行 (北京时间 8:00)
  schedule:
    - cron: "0 0 * * *"

  # 支持手动触发
  workflow_dispatch:

jobs:
  generate-and-send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 生成并发送财经新闻
        env:
          # ============================================
          # LLM 提供商配置
          # ============================================
          
          # 选择提供商: claude, deepseek, gemini, grok, openai
          # 推荐使用 deepseek (性价比高，中文支持好)
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}

          # API Keys
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          # 可选: 指定模型
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

          # ============================================
          # 通知配置
          # ============================================

          # 必填: 通知方式 (逗号分隔)
          NOTIFICATION_METHODS: ${{ secrets.NOTIFICATION_METHODS }}

          # 邮件配置
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          # 可选: Webhook
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

          # 语言设置 (默认: zh 中文)
          AI_RESPONSE_LANGUAGE: ${{ secrets.AI_RESPONSE_LANGUAGE }}

        run: |
          python main.py

      - name: 上传日志 (失败时)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            *.log
          retention-days: 7
